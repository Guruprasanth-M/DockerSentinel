# Redis configuration for HostSpectra
# Persistence: AOF + RDB for maximum data safety

# ─── AOF Persistence ───
appendonly yes
appendfsync everysec

# ─── RDB Snapshots ───
save 900 1
save 300 10
save 60 10000

# ─── Memory ───
maxmemory 256mb
maxmemory-policy allkeys-lru

# ─── Network ───
bind 0.0.0.0
protected-mode yes
port 6379

# ─── Authentication (H7) ───
# Password is passed via docker-compose command line (--requirepass)
# from the REDIS_PASSWORD env var in .env
# Do NOT set requirepass here — it is managed automatically.

# ─── Logging ───
loglevel notice
