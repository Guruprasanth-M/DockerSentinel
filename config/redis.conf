# Redis configuration for Docker Sentinel
# Persistence: AOF + RDB for maximum data safety

# ─── AOF Persistence ───
appendonly yes
appendfsync everysec

# ─── RDB Snapshots ───
save 900 1
save 300 10
save 60 10000

# ─── Memory ───
maxmemory 256mb
maxmemory-policy allkeys-lru

# ─── Network ───
bind 0.0.0.0
protected-mode yes
port 6379

# ─── Authentication (H7) ───
# Password set via docker-compose REDIS_PASSWORD env var
requirepass f6813172792021df311cc660598544c5

# ─── Logging ───
loglevel notice
