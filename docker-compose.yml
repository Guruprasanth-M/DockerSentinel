# docker-compose.yml
# HostSpectra v0.2

name: hostspectra

networks:
  hostspectra-net:
    driver: bridge

volumes:
  hostspectra-redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/redis

  hostspectra-model-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/models

  hostspectra-audit-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/audit

  hostspectra-state-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/collector-state

  hostspectra-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/db

services:


  # ─── 9th Service: PostgreSQL Database ────────────────────

  db:
    image: postgres:16-alpine
    container_name: hostspectra-db
    restart: always
    networks: [hostspectra-net]
    entrypoint: ["/bin/bash", "/scripts/db_password_sync.sh"]
    environment:
      # WARNING: Run main.sh first to generate .env with random passwords
      POSTGRES_DB: ${DB_NAME:-hostspectra}
      POSTGRES_USER: ${DB_USER:-hostspectra}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Run main.sh first to generate .env}
    volumes:
      - hostspectra-db-data:/var/lib/postgresql/data
      - ./config/db_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./config/db_password_sync.sh:/scripts/db_password_sync.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hostspectra} -d ${DB_NAME:-hostspectra}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M


  # Event bus and data persistence

  redis:
    image: redis:7.2-alpine
    container_name: hostspectra-redis
    restart: always
    networks: [hostspectra-net]
    volumes:
      - hostspectra-redis-data:/data
      - ./config/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-hostspectra_redis_pass}
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M


  # Log, network, process collection

  collectors:
    build:
      context: ./services/collectors
      dockerfile: Dockerfile
    image: hostspectra-collectors:0.2.0
    container_name: hostspectra-collectors
    restart: always
    networks: [hostspectra-net]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-hostspectra_redis_pass}@redis:6379/0
      - HOSTSPECTRA_CONFIG=/config/hostspectra.yml
      - HOST_LOGS_PATH=/host_logs
      - SERVICE_NAME=collectors
    volumes:
      - /var/log:/host_logs:ro
      - /proc:/host_proc:ro
      - hostspectra-state-data:/data/collector-state
      - ./config:/config:ro
      - ./scripts:/scripts:ro
    pid: "host"
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if os.path.exists('/tmp/collectors_healthy') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M


  # Anomaly detection and baseline

  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    image: hostspectra-ml:0.2.0
    container_name: hostspectra-ml
    restart: always
    networks: [hostspectra-net]
    depends_on:
      redis:
        condition: service_healthy
      collectors:
        condition: service_started
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-hostspectra_redis_pass}@redis:6379/0
      - HOSTSPECTRA_CONFIG=/config/hostspectra.yml
      - SERVICE_NAME=ml
    volumes:
      - hostspectra-model-data:/data/models
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if os.path.exists('/tmp/ml_healthy') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M


  # Rule-based alert evaluation

  policy:
    build:
      context: ./services/policy
      dockerfile: Dockerfile
    image: hostspectra-policy:0.2.0
    container_name: hostspectra-policy
    restart: always
    networks: [hostspectra-net]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-hostspectra_redis_pass}@redis:6379/0
      - DB_URL=postgresql://${DB_USER:-hostspectra}:${DB_PASSWORD:?Run main.sh to generate .env}@db:5432/${DB_NAME:-hostspectra}
      - HOSTSPECTRA_CONFIG=/config/hostspectra.yml
      - SERVICE_NAME=policy
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if os.path.exists('/tmp/policy_healthy') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M


  # Automated response actions (C1: pid host + nsenter for host iptables, cap_drop ALL + minimal caps)

  actions:
    build:
      context: ./services/actions
      dockerfile: Dockerfile
    image: hostspectra-actions:0.2.0
    container_name: hostspectra-actions
    restart: always
    networks: [hostspectra-net]
    pid: "host"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-hostspectra_redis_pass}@redis:6379/0
      - HOSTSPECTRA_CONFIG=/config/hostspectra.yml
      - SERVICE_NAME=actions
    volumes:
      - ./config:/config:ro
      - hostspectra-audit-data:/data/audit
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_PTRACE
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if os.path.exists('/tmp/actions_healthy') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
  # Alert notification delivery

  webhooks:
    build:
      context: ./services/webhooks
      dockerfile: Dockerfile
    image: hostspectra-webhooks:0.2.0
    container_name: hostspectra-webhooks
    restart: always
    networks: [hostspectra-net]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-hostspectra_redis_pass}@redis:6379/0
      - HOSTSPECTRA_CONFIG=/config/hostspectra.yml
      - SERVICE_NAME=webhooks
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if os.path.exists('/tmp/webhooks_healthy') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M


  # REST + WebSocket

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: hostspectra-api:0.2.0
    container_name: hostspectra-api
    restart: always
    networks: [hostspectra-net]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      collectors:
        condition: service_started
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-hostspectra_redis_pass}@redis:6379/0
      - HOSTSPECTRA_CONFIG=/config/hostspectra.yml
      - HOSTSPECTRA_API_TOKEN=${HOSTSPECTRA_API_TOKEN}
      - SERVICE_NAME=api
      - DB_URL=postgresql+asyncpg://${DB_USER:-hostspectra}:${DB_PASSWORD:?Run main.sh to generate .env}@db:5432/${DB_NAME:-hostspectra}
    volumes:
      - hostspectra-audit-data:/data/audit
      - ./config:/config:ro
      - /proc:/host_proc:ro
      - /sys:/host_sys:ro
      - /etc/os-release:/host_etc/os-release:ro
      - /etc/hostname:/host_etc/hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "${DOCKER_GID:-0}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M


  # nginx serving UI + reverse proxy

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    image: hostspectra-dashboard:0.2.0
    container_name: hostspectra-dashboard
    restart: always
    networks: [hostspectra-net]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "0.0.0.0:${DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./services/dashboard/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          memory: 16M

  # ─── Self-healing watchdog (BUG-M14) ─────────────────────
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: hostspectra-autoheal
    restart: always
    networks: [hostspectra-net]
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
