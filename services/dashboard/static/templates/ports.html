    </div>

    <div class="card">
        <div class="table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th>Port</th>
                        <th>Protocol</th>
                        <th>State</th>
                        <th>Service</th>
                        <th>PID</th>
                        <th>Process</th>

                    </tr>
                </thead>
                <tbody id="portsBody">
                    <tr><td colspan="7" class="text-center text-muted">Loading ports...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
