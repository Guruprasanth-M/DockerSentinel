<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Docker Sentinel - AI-Powered Linux Server Security Monitor">
    <title>Docker Sentinel</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
    <link rel="stylesheet" href="/css/effects.css">
</head>
<body>
    <div id="app">
        <div class="scanlines" aria-hidden="true"></div>

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <svg class="header-logo" viewBox="0 0 32 32" fill="none">
                    <rect x="2" y="2" width="28" height="28" rx="8" stroke="#007AFF" stroke-width="2"/>
                    <path d="M16 7v18M10 11l6 5 6-5M10 16l6 5 6-5" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
                    <circle cx="16" cy="16" r="3" fill="#007AFF" opacity="0.8"/>
                </svg>
                <span class="header-title">Docker Sentinel</span>
                <!-- <span class="header-version">v0.1</span> -->
            </div>
            <div class="header-center">
                <div class="status-indicator" id="connStatus">
                    <span class="pulse-dot pulse-dot--connecting"></span>
                    <span id="connText">Initializing</span>
                </div>
                <div class="status-indicator">
                    <span class="label">Uptime</span>
                    <span class="value mono" id="uptimeValue">00:00:00</span>
                </div>
            </div>
            <div class="header-right">
                <div class="header-clock">
                    <span class="mono" id="headerDate">----/--/--</span>
                    <span class="mono" id="headerClock">--:--:--</span>
                </div>
                <div class="event-counter" id="eventRate">
                    <span class="event-value" id="evtValue">0</span>
                    <span class="event-unit">evt/s</span>
                </div>
                <button class="header-btn" id="globalRefresh" title="Refresh all data">
                    <svg viewBox="0 0 16 16" width="14" height="14">
                        <path d="M13.65 2.35A7.96 7.96 0 008 0a8 8 0 108 8h-2a6 6 0 11-1.76-4.24L10 6h6V0l-2.35 2.35z" fill="currentColor"/>
                    </svg>
                </button>
                <div class="header-terminal">
                    <span class="mono">root@sentinel</span>
                    <span class="cursor-blink">_</span>
                </div>
            </div>
        </header>

        <!-- Shell layout -->
        <div class="shell">

            <!-- Sidebar navigation -->
            <nav class="sidebar" id="sidebar">
                <div class="sidebar-group">
                    <div class="sidebar-label">Monitor</div>
                    <a class="sidebar-link active" data-page="overview" href="/">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor" opacity="0.7"/>
                            <rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" opacity="0.7"/>
                            <rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" opacity="0.7"/>
                            <rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" opacity="0.7"/>
                        </svg>
                        <span>Overview</span>
                    </a>
                    <a class="sidebar-link" data-page="metrics" href="/metrics">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <path d="M1 14h14M3 10l3-4 3 3 4-6" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Metrics</span>
                    </a>
                    <a class="sidebar-link" data-page="alerts" href="/alerts">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <path d="M7.1 1.6a1 1 0 011.8 0l5.8 10.5a1 1 0 01-.9 1.4H2.2a1 1 0 01-.9-1.4L7.1 1.6z" fill="none" stroke="currentColor" stroke-width="1.3"/>
                            <line x1="8" y1="6" x2="8" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                            <circle cx="8" cy="11" r="0.6" fill="currentColor"/>
                        </svg>
                        <span>Alerts</span>
                        <span class="sidebar-badge hidden" id="alertBadge">0</span>
                    </a>
                    <a class="sidebar-link" data-page="containers" href="/containers">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <rect x="2" y="2" width="12" height="4" rx="1" stroke="currentColor" fill="none" stroke-width="1.2"/>
                            <rect x="2" y="8" width="12" height="4" rx="1" stroke="currentColor" fill="none" stroke-width="1.2"/>
                            <circle cx="4.5" cy="4" r="0.8" fill="currentColor"/>
                            <circle cx="4.5" cy="10" r="0.8" fill="currentColor"/>
                            <line x1="7" y1="4" x2="12" y2="4" stroke="currentColor" stroke-width="0.8"/>
                            <line x1="7" y1="10" x2="12" y2="10" stroke="currentColor" stroke-width="0.8"/>
                        </svg>
                        <span>Containers</span>
                    </a>
                </div>

                <div class="sidebar-group">
                    <div class="sidebar-label">System</div>
                    <a class="sidebar-link" data-page="processes" href="/processes">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.3"/>
                            <path d="M8 5v3.5l2.5 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Processes</span>
                    </a>
                    <a class="sidebar-link" data-page="ports" href="/ports">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <rect x="2" y="4" width="12" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
                            <circle cx="5.5" cy="8" r="1" fill="currentColor"/>
                            <circle cx="8" cy="8" r="1" fill="currentColor"/>
                            <circle cx="10.5" cy="8" r="1" fill="currentColor"/>
                        </svg>
                        <span>Ports</span>
                    </a>
                    <a class="sidebar-link" data-page="logs" href="/logs">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <rect x="2" y="1" width="12" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
                            <line x1="5" y1="5" x2="11" y2="5" stroke="currentColor" stroke-width="1"/>
                            <line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1"/>
                            <line x1="5" y1="11" x2="9" y2="11" stroke="currentColor" stroke-width="1"/>
                        </svg>
                        <span>Logs</span>
                    </a>
                </div>

                <div class="sidebar-group">
                    <div class="sidebar-label">Control</div>
                    <a class="sidebar-link" data-page="actions" href="/actions">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <path d="M8.5 1L2 9h5l-1 6L13 7H8l.5-6z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                        </svg>
                        <span>Actions</span>
                    </a>
                    <a class="sidebar-link" data-page="settings" href="/settings">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <circle cx="8" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
                            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M12.9 3.1l-1.4 1.4M4.5 11.5l-1.4 1.4" stroke="currentColor" stroke-width="1.1"/>
                        </svg>
                        <span>Settings</span>
                    </a>
                    <a class="sidebar-link" data-page="diagnostics" href="/diagnostics">
                        <svg class="sidebar-icon" viewBox="0 0 16 16">
                            <rect x="2" y="2" width="12" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
                            <path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        </svg>
                        <span>Diagnostics</span>
                    </a>
                </div>
            </nav>

            <!-- Main content area -->
            <main class="main" id="main">
                <div class="page-loader" id="pageLoader">
                    <div class="spinner"></div>
                    <span class="mono text-muted text-sm">Loading</span>
                </div>
            </main>

        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-left">
                <span class="mono">Docker Sentinel v0.1</span>
                <span class="footer-sep">|</span>
                <span>Built by <a href="https://github.com/Guruprasanth-M" target="_blank" rel="noopener">Guruprasanth M</a></span>
            </div>
            <div class="footer-center">
                <span class="mono text-muted text-xs" id="dataStatus">Ready</span>
            </div>
            <div class="footer-right">
                <a href="https://dockersentinel.selfmade.one" target="_blank" rel="noopener">dockersentinel.selfmade.one</a>
                <span class="footer-sep">|</span>
                <a href="https://github.com/Guruprasanth-M/dockersentinal" target="_blank" rel="noopener">GitHub</a>
            </div>
        </footer>
    </div>

    <script src="/vendor/echarts.min.js"></script>
    <script type="module">
    import('/js/app.js?v=' + Date.now());
    </script>
</body>
</html>
