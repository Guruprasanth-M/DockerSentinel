# services/dashboard/nginx.conf

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    upstream sentinel_api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ─── Security headers (server-level: inherited by locations without own add_header) ──
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ─── SPA fallback ─────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ─── index.html: never cache, bust stale cache ───────
        location = /index.html {
            add_header Cache-Control "no-store" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
        }

        # ─── JS & CSS: revalidate every request ──────────────
        location ~* \.(js|css)$ {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
            etag on;
        }

        # ─── Static assets: long cache ───────────────────────
        location ~* \.(woff2|svg|ico|png)$ {
            expires 7d;
            add_header Cache-Control "public, immutable" always;
        }

        # ─── HTML templates: revalidate ───────────────────────
        location /templates/ {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            etag on;
        }

        # ─── REST API proxy ───────────────────────────────────
        location /api/ {
            proxy_pass http://sentinel_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ─── WebSocket proxy ──────────────────────────────────
        location /ws/live {
            proxy_pass http://sentinel_api/ws/live;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─── Health check endpoint ────────────────────────────
        location = /health {
            proxy_pass http://sentinel_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
